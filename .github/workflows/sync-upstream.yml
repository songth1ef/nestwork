name: Sync Nestwork upstream

# Automated protocol-layer sync for private Nestwork instances.
#
# Opens a PR on your private Nestwork repo whenever the upstream template at
# songth1ef/nestwork ships changes to scripts/, AGENTS.md, CLAUDE.md, SOUL.md
# or READMEs. Never touches queen/, agents/, shared/, or projects/.
#
# The bot keeps a single long-lived branch `sync/upstream`. Same-day reruns
# update the branch in place; the PR stays open until merged.
#
# Review the diff before merging -- this is your escape valve if upstream
# ships a breaking protocol change.
#
# PR mutations use the GitHub REST API instead of `gh pr ...` because some
# repositories reject GraphQL createPullRequest calls from Actions even when
# pull-request write permissions are enabled.

on:
  schedule:
    - cron: '0 3 * * *'      # 03:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Preemptively opt JavaScript actions (actions/checkout etc.) into the
      # Node 24 runtime. Node 20 is deprecated in GitHub Actions and will be
      # removed 2026-09-16; this env var suppresses the deprecation warning
      # and keeps the job future-proof.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      UPSTREAM_URL: https://github.com/songth1ef/nestwork.git
      UPSTREAM_BRANCH: main
      SYNC_BRANCH: sync/upstream
      # Protocol paths that GITHUB_TOKEN can push.
      # Note: .github/workflows/ is intentionally excluded here — GitHub
      # rejects GITHUB_TOKEN pushes that modify workflow files for security
      # reasons (you would get 403 Resource not accessible by integration).
      # Workflow updates are synced via scripts/maintenance/update.sh
      # instead, which uses your local git auth that has workflow scope.
      PROTOCOL_PATHS: scripts/ AGENTS.md CLAUDE.md SOUL.md README.md README.zh.md
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "nestwork-bot"
          git config user.email "nestwork-bot@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || \
            git remote set-url upstream "$UPSTREAM_URL"
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Detect protocol-layer drift
        id: drift
        run: |
          if git diff HEAD upstream/"$UPSTREAM_BRANCH" --quiet -- $PROTOCOL_PATHS; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale sync PR if in sync
        if: steps.drift.outputs.has_changes == 'false'
        env:
          # Prefer a repo secret PAT when provided. Some repositories still
          # reject create/reopen PR mutations from the default GITHUB_TOKEN
          # even with pull-request permissions enabled.
          GH_TOKEN: ${{ secrets.NESTWORK_SYNC_TOKEN != '' && secrets.NESTWORK_SYNC_TOKEN || github.token }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          HEAD_REF="${GITHUB_REPOSITORY_OWNER}:${SYNC_BRANCH}"
          AUTH=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          OPEN_PRS=$(curl -fsSL "${AUTH[@]}" \
            "${API}/pulls?state=open&head=${HEAD_REF}&base=main" \
            | jq -r '.[].number')
          for n in $OPEN_PRS; do
            curl -fsSL -X PATCH "${AUTH[@]}" \
              "${API}/pulls/${n}" \
              -d '{"state":"closed"}' >/dev/null
          done
          git push origin --delete "$SYNC_BRANCH" 2>/dev/null || true

      - name: Prepare sync branch
        if: steps.drift.outputs.has_changes == 'true'
        run: |
          git checkout -B "$SYNC_BRANCH" origin/main
          git checkout upstream/"$UPSTREAM_BRANCH" -- $PROTOCOL_PATHS
          if git diff --cached --quiet; then
            echo "No staged delta after checkout -- bailing out cleanly."
            exit 0
          fi
          git commit -m "chore: sync nestwork protocol from upstream"
          git push origin "$SYNC_BRANCH" --force

      - name: Open or update PR
        if: steps.drift.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.NESTWORK_SYNC_TOKEN != '' && secrets.NESTWORK_SYNC_TOKEN || github.token }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          HEAD_REF="${GITHUB_REPOSITORY_OWNER}:${SYNC_BRANCH}"
          AUTH=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          # Build the PR body via a heredoc so we don't have to fight YAML's
          # literal-block-scalar indentation rules with a multi-line `--body`.
          # YAML strips the block-scalar indent before handing content to bash,
          # so the heredoc lines below arrive unindented inside the runner.
          cat > /tmp/pr_body.md <<BODY
          Automated protocol-layer sync from upstream (${UPSTREAM_URL}).

          **Scope** -- protocol files only:

          \`\`\`
          ${PROTOCOL_PATHS}
          \`\`\`

          **Untouched**: \`queen/\`, \`agents/\`, \`shared/\`, \`projects/\` -- those remain private.

          Review the diff and merge when it looks good. If upstream ships something you do not want, close this PR; the bot will reopen only when upstream changes again.
          BODY
          PR_BODY_JSON=$(jq -Rs . /tmp/pr_body.md)
          EXISTING_OPEN=$(curl -fsSL "${AUTH[@]}" \
            "${API}/pulls?state=open&head=${HEAD_REF}&base=main" \
            | jq -r '.[0].number // empty')
          if [ -n "$EXISTING_OPEN" ]; then
            echo "PR #$EXISTING_OPEN already open -- branch updated in place."
            curl -fsSL -X PATCH "${AUTH[@]}" \
              "${API}/pulls/${EXISTING_OPEN}" \
              -d "{\"title\":\"chore: sync Nestwork upstream\",\"body\":${PR_BODY_JSON}}" >/dev/null
            exit 0
          fi

          EXISTING_CLOSED=$(curl -fsSL "${AUTH[@]}" \
            "${API}/pulls?state=closed&head=${HEAD_REF}&base=main" \
            | jq -r '[.[] | select(.merged_at == null)][0].number // empty')
          if [ -n "$EXISTING_CLOSED" ]; then
            echo "Reopening closed PR #$EXISTING_CLOSED for updated sync branch."
            curl -fsSL -X PATCH "${AUTH[@]}" \
              "${API}/pulls/${EXISTING_CLOSED}" \
              -d "{\"state\":\"open\",\"title\":\"chore: sync Nestwork upstream\",\"body\":${PR_BODY_JSON}}" >/dev/null
            exit 0
          fi

          curl -fsSL -X POST "${AUTH[@]}" \
            "${API}/pulls" \
            -d "{\"title\":\"chore: sync Nestwork upstream\",\"head\":\"${SYNC_BRANCH}\",\"base\":\"main\",\"body\":${PR_BODY_JSON}}" >/dev/null
